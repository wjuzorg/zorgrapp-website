<!DOCTYPE html><html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ontvang informatie | ZorgRapp</title>
  <meta
    name="description"
    content="Vraag vrijblijvend screenshots en informatie over ZorgRapp aan."
  />  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #0f172a;
      --border: #e2e8f0;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius: 20px;
      --max: 760px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      padding: 28px 0 12px;
    }

    .back-link {
      color: var(--muted);
      font-weight: 600;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      margin: 12px 0 40px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0 0 28px;
      color: var(--muted);
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .field {
      margin-bottom: 20px;
    }

    input,
    textarea {
      width: 100%; 
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font: inherit;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      display: inline-block;
      width: 100%; 
      border: none;
      cursor: pointer;
      padding: 15px 22px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      background: var(--primary);
      color: #fff;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding-bottom: 40px;
    }

    @media (max-width: 768px) {
      .card {
        padding: 24px;
      }
    }
  </style></head>
<body>
  <header class="container">
    <a href="index.html" class="back-link">← Terug naar home</a>
  </header>  <main class="container">
    <section class="card">
      <h1>Ontvang vrijblijvend informatie</h1>
      <p class="lead">
        Vul uw naam en e-mailadres in. U ontvangt vrijblijvend screenshots en uitleg per e-mail.
      </p><!--
    VERVANG JOUW_FORMSPREE_CODE door je eigen Formspree code.
    Bijvoorbeeld: https://formspree.io/f/xovwabcd
  -->
  <form action="https://formspree.io/f/JOUW_FORMSPREE_CODE" method="POST">
    <div class="field">
      <label for="name">Naam</label>
      <input
        id="name"
        type="text"
        name="naam"
        required
        placeholder="Uw naam"
      />
    </div>

    <div class="field">
      <label for="email">E-mailadres</label>
      <input
        id="email"
        type="email"
        name="email"
        required
        placeholder="uw@emailadres.nl"
      />
    </div>

    <div class="field">
      <label for="message">Bericht (optioneel)</label>
      <textarea
        id="message"
        name="bericht"
        placeholder="Ik ontvang graag vrijblijvend screenshots en informatie over ZorgRapp."
      ></textarea>
    </div>

    <input
      type="hidden"
      name="aanvraag_type"
      value="Ontvang informatie"
    />

    <button type="submit" class="btn">
      Verstuur mijn aanvraag
    </button>
  </form>

  <p class="note">
    Uw gegevens worden uitsluitend gebruikt om informatie over ZorgRapp toe te sturen.
  </p>
</section>

  </main>  <footer class="container">
    <a href="privacy.html">Privacyverklaring</a>
  </footer>
</body>
</html>
